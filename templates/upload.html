{% extends "base.html" %}

{% block title %}Upload Video - ArgonTube{% endblock %}

{% block content %}
<div class="upload-container">
    <div class="upload-card glass-card">
        <div class="upload-header">
            <svg viewBox="0 0 24 24" width="48" height="48" class="upload-icon">
                <path fill="#ff0000" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <h1>Upload Video</h1>
            <p>Share your content with the world</p>
        </div>
        
        <form method="POST" action="{{ url_for('upload') }}" enctype="multipart/form-data" class="upload-form" id="uploadForm">
            <div class="upload-file-section">
                <div class="file-upload-area" id="videoUploadArea">
                    <input type="file" name="video" id="videoFile" accept="video/*" required hidden>
                    <div class="upload-placeholder" id="videoPlaceholder">
                        <svg viewBox="0 0 24 24" width="64" height="64">
                            <path fill="#ff0000" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                        </svg>
                        <p>Click to select video file</p>
                        <span>MP4, WebM, OGG supported</span>
                    </div>
                    <div class="video-preview" id="videoPreview" style="display:none;">
                        <video id="previewVideo" controls></video>
                    </div>
                </div>
                
                <div class="file-upload-area thumbnail-upload" id="thumbnailUploadArea">
                    <input type="file" name="thumbnail" id="thumbnailFile" accept="image/*" hidden>
                    <div class="upload-placeholder" id="thumbnailPlaceholder">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <path fill="#ff0000" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                        </svg>
                        <p>Select thumbnail</p>
                        <span>PNG, JPG, JPEG, GIF</span>
                    </div>
                    <div class="thumbnail-preview" id="thumbnailPreview" style="display:none;">
                        <img id="previewThumbnail" alt="Thumbnail preview">
                    </div>
                </div>
            </div>
            
            <div class="upload-details">
                <div class="form-group">
                    <label for="title">Video Title *</label>
                    <input type="text" name="title" id="title" class="form-input" 
                           placeholder="Enter a descriptive title" required maxlength="200">
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" class="form-textarea" 
                              placeholder="Describe your video (optional)" maxlength="5000" rows="4"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select name="category" id="category" class="form-select">
                            <option value="">Select category</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.icon }} {{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">Tags</label>
                        <input type="text" name="tags" id="tags" class="form-input" 
                               placeholder="gaming, tutorial, music... (comma separated)" maxlength="500">
                    </div>
                </div>
            </div>
            
            <div class="upload-progress" id="uploadProgress" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">Uploading... 0%</p>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('home') }}" class="cancel-btn">Cancel</a>
                <button type="submit" class="upload-submit-btn" id="submitBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
                    </svg>
                    Upload Video
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const videoFile = document.getElementById('videoFile');
    const videoUploadArea = document.getElementById('videoUploadArea');
    const videoPlaceholder = document.getElementById('videoPlaceholder');
    const videoPreview = document.getElementById('videoPreview');
    const previewVideo = document.getElementById('previewVideo');
    
    const thumbnailFile = document.getElementById('thumbnailFile');
    const thumbnailUploadArea = document.getElementById('thumbnailUploadArea');
    const thumbnailPlaceholder = document.getElementById('thumbnailPlaceholder');
    const thumbnailPreview = document.getElementById('thumbnailPreview');
    const previewThumbnail = document.getElementById('previewThumbnail');
    
    const uploadForm = document.getElementById('uploadForm');
    const uploadProgress = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    
    videoUploadArea.addEventListener('click', () => videoFile.click());
    
    videoFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            previewVideo.src = url;
            videoPlaceholder.style.display = 'none';
            videoPreview.style.display = 'block';
        }
    });
    
    thumbnailUploadArea.addEventListener('click', () => thumbnailFile.click());
    
    thumbnailFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewThumbnail.src = e.target.result;
                thumbnailPlaceholder.style.display = 'none';
                thumbnailPreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });
    
    uploadForm.addEventListener('submit', function(e) {
        uploadProgress.style.display = 'block';
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 90) {
                progress = 90;
                clearInterval(interval);
            }
            progressFill.style.width = progress + '%';
            progressText.textContent = 'Uploading... ' + Math.round(progress) + '%';
        }, 200);
    });
});
</script>
{% endblock %}
