{% extends "base.html" %}

{% block title %}Page Not Found - ArgonTube{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-card glass-card">
        <h1 class="error-code">404</h1>
        <div class="error-icon">
            <svg viewBox="0 0 24 24" width="64" height="64">
                <path fill="#ff0000" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>
        <h2>Video Not Found</h2>
        <p>This video might have been deleted or doesn't exist.</p>
        <a href="{{ url_for('home') }}" class="back-home-btn">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
