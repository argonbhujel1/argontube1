{% extends "base.html" %}

{% block title %}Create Account - ArgonTube{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <svg viewBox="0 0 24 24" width="48" height="48" class="auth-logo">
                <polygon points="5,3 19,12 5,21" fill="#ff0000"/>
            </svg>
            <h1>Create Account</h1>
            <p>Join the ArgonTube community</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    Username
                </label>
                <input type="text" name="username" id="username" class="form-input" 
                       placeholder="Choose a username" required minlength="3" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="email">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    Email Address
                </label>
                <input type="email" name="email" id="email" class="form-input" 
                       placeholder="Enter your email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                    Password
                </label>
                <input type="password" name="password" id="password" class="form-input" 
                       placeholder="Create a password" required minlength="6" autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    Confirm Password
                </label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-input" 
                       placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
            </div>
            
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="auth-submit-btn">
                <span>Create Account</span>
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
                </svg>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
